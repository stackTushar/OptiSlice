<html lang="en">
<head>
  <meta charset="UTF-8" />

<body data-page="signup">
  <header class="site-header">
    <div class="container nav-wrap">
      <h1 class="brand">OptiSlice</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="product.html">Product</a>
        <a href="signup.html" aria-current="page">Signup</a>
        <a href="campaigns.html">Campaigns</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="reports.html">Reports</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="panel form-panel">
      <h2>Get Launch Offers</h2>
      <p>Signup submission is tracked as the primary conversion goal.</p>
      <form id="signup-form" class="signup-form">
        <label for="name">Name</label>
        <input id="name" name="name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="plan">Plan Preference</label>
        <select id="plan" name="plan">
          <option value="trial">Free Trial</option>
          <option value="basic">Basic Plan</option>
          <option value="pro">Pro Plan</option>
        </select>

        <label class="checkbox-row">
          <input id="offers" type="checkbox" checked />
          Receive campaign offers by email
        </label>

        <button type="submit" class="btn">Sign Up</button>
      </form>
      <p id="form-msg" class="form-msg" hidden>Thanks! You are signed up.</p>
    </section>

    <section class="panel ad-panel">
      <h3>Sponsored</h3>
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
        data-ad-slot="1234567890"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
